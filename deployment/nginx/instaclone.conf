# Mevcut AykutOnPC nginx config'inin SERVER bloğu içine include edilecek snippet.
# Yer: /opt/aykutonpc/nginx/conf.d/aykutonpc.conf — `server { ... }` bloğunun içinde.
# T-015'te apply.
#
# Pattern: VPS rehberi 313-326. satır "Strateji A — path prefix".

# InstaClone API — path prefix routing (ADR-007)
# Mobil app baseUrl: https://178.104.198.249/insta/api/...
location /insta/ {
    # host.docker.internal AykutOnPC nginx container'ından host network'üne çıkış
    proxy_pass http://host.docker.internal:9001/;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /insta;

    # SignalR WebSocket upgrade desteği (T-009 / Sprint #4 DM)
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Timeout — uzun süreli SignalR connection için artırıldı
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    # Body size — medya upload için (post foto/video, profil avatar)
    client_max_body_size 25m;
}
