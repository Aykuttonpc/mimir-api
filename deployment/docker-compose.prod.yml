name: mimir

services:
  db:
    image: postgres:16-alpine
    container_name: mimir-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - mimir-db-data:/var/lib/postgresql/data
    mem_limit: 512m
    networks:
      - mimir-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mimir-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--maxmemory", "200mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - mimir-redis-data:/data
    mem_limit: 256m
    networks:
      - mimir-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:                                       # Service name 'api' (eski 'web') — AykutOnPC stack'i de 'web' service kullanıyor, alias çakışmasından kaçın
    image: mimir-api:${WEB_TAG}             # 'latest' YASAK — WEB_TAG = commit SHA / semver. .env.prod'da set.
    container_name: mimir-web
    restart: unless-stopped
    build:
      context: ./repo                        # VPS'te /opt/mimir/repo (git clone target)
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Host=db;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}"
      Redis__ConnectionString: "redis:6379,password=${REDIS_PASSWORD}"
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Smtp__Host: ${SMTP_HOST}
      Smtp__Port: ${SMTP_PORT}
      Smtp__User: ${SMTP_USER}
      Smtp__Password: ${SMTP_PASSWORD}
      Admin__BootstrapEmail: ${ADMIN_BOOTSTRAP_EMAIL}
      Admin__BootstrapPassword: ${ADMIN_BOOTSTRAP_PASSWORD}
      Admin__BootstrapUsername: ${ADMIN_BOOTSTRAP_USERNAME}
      Crypto__MessageKey: ${CRYPTO_MESSAGE_KEY}
      MinAppVersion__Android: ${MIN_APP_VERSION_ANDROID:-0.1.0}
      LatestAppVersion__Android: ${LATEST_APP_VERSION_ANDROID:-0.1.0}
      AppDownloadUrl__Android: ${APP_DOWNLOAD_URL_ANDROID:-}
      Firebase__ServiceAccountPath: /app/secrets/fcm-service-account.json   # ADR-017
      Turn__Host: ${TURN_HOST:-}                # Sprint #12 — coturn external hostname
      Turn__Realm: ${TURN_REALM:-mimir}
      Turn__Secret: ${TURN_SECRET:-}             # HMAC secret, coturn ile aynı
    ports:
      - "127.0.0.1:9001:8080"               # Localhost smoke test ve fallback için bind kalsın
    volumes:
      - mimir-dp-keys:/home/mimir/.aspnet/DataProtection-Keys   # ASP.NET Core data protection key persistence (container restart sonrası key kaybolmasın)
      - /opt/mimir/secrets:/app/secrets:ro                       # ADR-017: FCM service account JSON (read-only)
    mem_limit: 1g
    networks:
      mimir-net: {}                           # Internal: db + redis ile konuşma (alias 'api')
      aykutonpc_frontend:
        # Default alias 'api' AykutOnPC'nin 'web' alias'ı ile çakışmıyor.
        # Nginx config 'proxy_pass http://mimir-web:8080/' container_name kullandığı için 'api' alias'ı önemli değil.
        aliases:
          - mimir-web
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  # Sprint #12 — coturn STUN/TURN for WebRTC voice calls (P2P + relay fallback).
  # network_mode: host şart — UDP RTP relay için NAT translation şeffaf olmalı.
  coturn:
    image: coturn/coturn:4.6
    container_name: mimir-coturn
    restart: unless-stopped
    network_mode: host
    command:
      - "-n"
      - "--use-auth-secret"
      - "--static-auth-secret=${TURN_SECRET}"
      - "--realm=${TURN_REALM:-mimir}"
      - "--listening-port=3478"
      - "--tls-listening-port=5349"
      - "--external-ip=${TURN_EXTERNAL_IP}"
      - "--min-port=49152"
      - "--max-port=49200"
      - "--no-multicast-peers"
      - "--no-loopback-peers"
      - "--no-cli"
      - "--no-tlsv1"
      - "--no-tlsv1_1"
      - "--log-file=stdout"
      - "--simple-log"
    mem_limit: 128m

volumes:
  mimir-db-data:
  mimir-redis-data:
  mimir-dp-keys:

networks:
  mimir-net:
    driver: bridge
  aykutonpc_frontend:
    external: true                            # AykutOnPC compose tarafından yönetiliyor; sadece üyeyiz
