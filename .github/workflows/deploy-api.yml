name: deploy-api

# Trigger: main'e push veya manual dispatch.
# VPS'te git pull + docker compose build + force-recreate + healthcheck.
# Healthcheck fail → previous SHA tag'e otomatik rollback.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'deployment/**'
      - 'Dockerfile'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

concurrency:
  group: deploy-api-prod
  cancel-in-progress: false   # deploy yarıda kesilmesin

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -e
          [ -n "$SSH_KEY" ]  || { echo "❌ VPS_SSH_KEY secret boş"; exit 1; }
          [ -n "$VPS_HOST" ] || { echo "❌ VPS_HOST secret boş"; exit 1; }
          [ -n "$VPS_USER" ] || { echo "❌ VPS_USER secret boş"; exit 1; }
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts
          echo "✅ SSH setup ok (key=$(wc -c < ~/.ssh/deploy_key) bytes, host=$VPS_HOST)"

      - name: Compute image tag
        id: tag
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Capture previous SHA (rollback için)
        id: prev
        run: |
          PREV=$(ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd /opt/mimir/repo && git rev-parse --short HEAD")
          echo "sha=$PREV" >> "$GITHUB_OUTPUT"
          echo "Previous deployed SHA: $PREV"

      - name: Pull + build + restart
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} <<'EOF'
            set -e
            cd /opt/mimir/repo
            git fetch origin main
            git reset --hard origin/main

            # Compose dosyası repo dışında manuel kopya — drift'i önle, repo'dakini overwrite et
            sudo cp deployment/docker-compose.prod.yml /opt/mimir/docker-compose.prod.yml
            sudo chown deploy:deploy /opt/mimir/docker-compose.prod.yml

            cd /opt/mimir
            # WEB_TAG = commit SHA → image immutable, rollback için cached layer var
            export WEB_TAG=${{ steps.tag.outputs.sha }}
            sed -i "s/^WEB_TAG=.*/WEB_TAG=$WEB_TAG/" .env.prod || echo "WEB_TAG=$WEB_TAG" >> .env.prod

            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build --force-recreate api
          EOF

      - name: Healthcheck (60s grace)
        id: health
        run: |
          for i in $(seq 1 12); do
            sleep 5
            STATUS=$(ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
              "curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:9001/health")
            echo "Attempt $i: /health → $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "ok=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "ok=false" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Rollback on failure
        if: failure() && steps.prev.outputs.sha != ''
        run: |
          echo "❌ Healthcheck fail — rollback to ${{ steps.prev.outputs.sha }}"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} <<EOF
            set -e
            cd /opt/mimir/repo
            git reset --hard ${{ steps.prev.outputs.sha }}
            sudo cp deployment/docker-compose.prod.yml /opt/mimir/docker-compose.prod.yml
            cd /opt/mimir
            export WEB_TAG=${{ steps.prev.outputs.sha }}
            sed -i "s/^WEB_TAG=.*/WEB_TAG=$WEB_TAG/" .env.prod
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build --force-recreate api
          EOF
