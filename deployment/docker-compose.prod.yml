name: mimir

services:
  db:
    image: postgres:16-alpine
    container_name: mimir-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - mimir-db-data:/var/lib/postgresql/data
    mem_limit: 512m
    networks:
      - mimir-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mimir-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--maxmemory", "200mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - mimir-redis-data:/data
    mem_limit: 256m
    networks:
      - mimir-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  web:
    image: mimir-api:${WEB_TAG}             # 'latest' YASAK — WEB_TAG = commit SHA / semver. .env.prod'da set.
    container_name: mimir-web
    restart: unless-stopped
    build:
      context: ./repo                        # VPS'te /opt/mimir/repo (git clone target)
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Host=db;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}"
      Redis__ConnectionString: "redis:6379,password=${REDIS_PASSWORD}"
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Smtp__Host: ${SMTP_HOST}
      Smtp__Port: ${SMTP_PORT}
      Smtp__User: ${SMTP_USER}
      Smtp__Password: ${SMTP_PASSWORD}
    ports:
      - "127.0.0.1:9001:8080"               # Localhost smoke test ve fallback için bind kalsın
    mem_limit: 1g
    networks:
      - mimir-net                             # Internal: db + redis ile konuşma
      - aykutonpc_frontend                    # Shared: AykutOnPC nginx → mimir-web direct (host.docker.internal'e gerek yok)
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

volumes:
  mimir-db-data:
  mimir-redis-data:

networks:
  mimir-net:
    driver: bridge
  aykutonpc_frontend:
    external: true                            # AykutOnPC compose tarafından yönetiliyor; sadece üyeyiz
